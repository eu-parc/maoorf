---
id: https://w3id.org/eu-parc/maoorf
name: maoorf
title: maoorf
description: |-
  A machine actionable OORF schema using LinkML
license: MIT
see_also:
  - https://eu-parc.github.io/maoorf

prefixes:
  maoorf: https://w3id.org/eu-parc/maoorf/
  linkml: https://w3id.org/linkml/
  biolink: https://w3id.org/biolink/vocab/
  schema: http://schema.org/
  PATO: http://purl.obolibrary.org/obo/PATO_
  example: http://www.example.org/rdf#
default_prefix: maoorf
default_range: string

imports:
  - linkml:types

classes:
  OORF:
    tree_root: true
    attributes:
      description:
      term:
        required: true
        range: TERM
      daprm:
        required: true
        multivalued: true
        inlined_as_list: true
        range: DAPRM
      darm:
        required: true
        multivalued: true
        inlined_as_list: true
        range: DARM
  TERM:
    attributes:
      term_stuff:

  DAPRM:
    abstract: true
    slot_usage:
      type:
        designates_type: true
    attributes:
      type:

  DARM:
    abstract: true
    slot_usage:
      type:
        designates_type: true
    attributes:
      type:

  BMDDARM:
    is_a: DARM
    attributes:
      bmd_stuff

  RNASeqDAPRM:
    is_a: DAPRM
    attributes:
      rna_stuff:

  MetabolomicsDAPRM:
    is_a: DAPRM
    attributes:
      metabolomics_stuff:
